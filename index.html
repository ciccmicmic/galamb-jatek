<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>NER-lovag Kalandjai</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif; 
            touch-action: none; 
            -webkit-user-select: none;
            user-select: none;
        }
        #game-container { position: relative; aspect-ratio: 1100 / 600; width: 100%; max-width: 1100px; max-height: 100vh; }
        canvas { width: 100%; height: 100%; background: #fff; display: block; image-rendering: -webkit-optimize-contrast; }
        #menu { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; background: rgba(255,255,255,0.98); padding: 20px; border-radius: 15px; z-index: 9999; width: 85%; max-width: 320px; box-shadow: 0 0 30px rgba(0,0,0,0.5); }
        #menu img { width: 100%; border-radius: 10px; margin-bottom: 15px; }
        input { padding: 12px; width: 85%; margin-bottom: 15px; font-size: 18px; border-radius: 8px; border: 2px solid #ccc; }
        button { padding: 15px; width: 95%; background: #e74c3c; color: white; border: none; border-radius: 10px; font-size: 20px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="menu">
        <img src="landingpage.png">
        <input type="text" id="playerName" placeholder="NER-név..." maxlength="12">
        <button id="startBtn">INDÍTÁS / START</button>
    </div>
    <canvas id="gameCanvas" width="1100" height="600"></canvas>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const menu = document.getElementById('menu');
const startBtn = document.getElementById('startBtn');

let gameRunning = false;
let gameSpeed = 420;
let points = 0;
let playerName = "";
let bgX = 0;
let lastTime = 0;

// ASSETEK
function loadImg(src) { const img = new Image(); img.src = src; return img; }
const imgRun = [loadImg("ViktorRun1.png"), loadImg("ViktorRun2.png")];
const imgJump = loadImg("ViktorJump.png");
const imgDuck = [loadImg("ViktorDuck1.png"), loadImg("ViktorDuck2.png")];
const imgBg = loadImg("background.png"); 
const imgHeli = [loadImg("heli1.png"), loadImg("heli2.png")];

// --- JAVÍTVA: LargeAvocado2 hozzáadva a listához ---
const imgAvo = [
    loadImg("SmallAvocado1.png"), 
    loadImg("LargeAvocado1.png"), 
    loadImg("LargeAvocado2.png")
];

const bgMusic = new Audio("background_music.ogg");
bgMusic.loop = true;
const sndJump = new Audio("jump.ogg");
const sndHit = new Audio("collision.ogg");

const player = { x: 80, y: 400, w: 110, h: 120, velY: 0, gravity: 1000, isJumping: false, isDucking: false, frameTimer: 0 };
let obstacles = [];
let touchStartTime = 0;
let isTouching = false;
let obstacleTimer = 0;

function startGame(e) {
    if (e) e.preventDefault();
    playerName = document.getElementById('playerName').value || "Vendég";
    bgMusic.play().catch(()=>{});
    menu.style.display = 'none';
    gameRunning = true;
    lastTime = performance.now();
    requestAnimationFrame(gameLoop);
}

startBtn.addEventListener('touchstart', startGame, {passive: false});
startBtn.addEventListener('click', startGame);

function inputStart(e) { 
    if(!gameRunning || menu.style.display !== 'none') return; 
    touchStartTime = performance.now(); 
    isTouching = true; 
}

function inputEnd(e) {
    if(!gameRunning || menu.style.display !== 'none') return;
    let duration = performance.now() - touchStartTime;
    if(duration < 180 && !player.isJumping) {
        player.velY = -580; 
        player.isJumping = true;
        sndJump.currentTime = 0;
        sndJump.play().catch(()=>{});
    }
    isTouching = false; player.isDucking = false;
}

window.addEventListener('touchstart', (e) => {
    if (menu.style.display === 'none') {
        e.preventDefault();
        inputStart(e);
    }
}, {passive: false});

window.addEventListener('touchend', (e) => {
    if (menu.style.display === 'none') {
        inputEnd(e);
    }
}, {passive: false});

window.addEventListener('mousedown', inputStart);
window.addEventListener('mouseup', inputEnd);

function gameLoop(timestamp) {
    if (!gameRunning) return;
    let deltaTime = (timestamp - lastTime) / 1000; 
    if (deltaTime > 0.05) deltaTime = 0.016;
    lastTime = timestamp;

    update(deltaTime);
    draw();
    requestAnimationFrame(gameLoop);
}

function update(dt) {
    bgX -= gameSpeed * 0.25 * dt;
    if (isTouching && (performance.now() - touchStartTime > 180)) player.isDucking = true;
    
    if (player.isJumping) {
        player.y += player.velY * dt;
        player.velY += player.gravity * dt;
        if (player.y >= 400) { player.y = 400; player.isJumping = false; player.velY = 0; }
    }

    obstacleTimer += dt;
    if (obstacleTimer > 1.6) {
        if (Math.random() < 0.02) {
            const isHeli = Math.random() > 0.7;
            // Véletlenszerűen választunk az avokádók közül
            const avoImg = imgAvo[Math.floor(Math.random() * imgAvo.length)];
            
            obstacles.push({ 
                x: 1150, 
                y: isHeli ? 280 : 430, 
                w: 85, h: 85, 
                img: isHeli ? imgHeli[0] : avoImg 
            });
            obstacleTimer = 0;
        }
    }

    for (let i = obstacles.length - 1; i >= 0; i--) {
        let obs = obstacles[i];
        obs.x -= gameSpeed * dt;
        
        if (player.x < obs.x + obs.w - 25 && player.x + player.w - 25 > obs.x + 25 && 
            (player.isDucking ? player.y + 50 : player.y) < obs.y + obs.h - 25 && 
            player.y + player.h > obs.y + 25) {
             sndHit.play(); bgMusic.pause(); gameRunning = false;
             setTimeout(() => location.reload(), 1200);
        }
        if (obs.x < -200) obstacles.splice(i, 1);
    }

    points++;
    if (points % 800 === 0) gameSpeed += 25;
    player.frameTimer += dt * 10;
}

function draw() {
    ctx.clearRect(0, 0, 1100, 600);
    const bgScale = 600 / imgBg.height;
    const bgW = imgBg.width * bgScale;
    
    let bX = Math.round(bgX);
    ctx.drawImage(imgBg, bX, 0, bgW, 600);
    if (bX + bgW < 1100) { ctx.drawImage(imgBg, bX + Math.round(bgW), 0, bgW, 600); }
    if (bgX <= -bgW) bgX = 0;

    let cImg = player.isJumping ? imgJump : (player.isDucking ? imgDuck[Math.floor(player.frameTimer) % 2] : imgRun[Math.floor(player.frameTimer) % 2]);
    const dH = player.isDucking ? player.h * 0.7 : player.h;
    const dY = player.isDucking ? player.y + (player.h * 0.3) : player.y;
    
    ctx.drawImage(cImg, Math.round(player.x), Math.round(dY), player.w, dH);
    for(let obs of obstacles) {
        ctx.drawImage(obs.img, Math.round(obs.x), obs.y, obs.w, obs.h);
    }

    ctx.fillStyle = "black"; ctx.font = "bold 26px Arial";
    ctx.fillText(`NER: ${playerName} | Közpénz: ${points}`, 30, 50);
}
</script>
</body>
</html>
