<style>
    /* A háttér fekete lesz a széleken, ha túl széles a monitor */
    body { 
        margin: 0; 
        overflow: hidden; 
        background: #000; 
        display: flex; 
        justify-content: center; 
        align-items: center; 
        height: 100vh;
        touch-action: none;
    }
    canvas { 
        background: #fff; 
        box-shadow: 0 0 50px rgba(0,0,0,0.5);
        /* Élesítés (pixel art hatás) */
        image-rendering: pixelated; 
    }
</style>

<script>
// Cseréld le a resize függvényt erre:
function resize() {
    const targetRatio = 1100 / 600; // A fix játék arány
    let newWidth = window.innerWidth;
    let newHeight = window.innerHeight;

    // Megnézzük, hogy az ablak aránya szélesebb-e, mint a játéké
    if (newWidth / newHeight > targetRatio) {
        newWidth = newHeight * targetRatio;
    } else {
        newHeight = newWidth / targetRatio;
    }

    // A vászon méreteit beállítjuk a kiszámolt, arányos értékre
    canvas.width = 1100; // Belső felbontás fix marad az élességért
    canvas.height = 600;

    // A megjelenítési méretet a CSS-sel skálázzuk
    canvas.style.width = newWidth + 'px';
    canvas.style.height = newHeight + 'px';

    // Viktor pozíciója a fix 600-as magassághoz képest
    player.y = 400; 
}

// A draw függvényben is fixáljuk a hátteret:
function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Itt most már nem kell scale-ezni, mert a vászon fix 1100x600
    ctx.drawImage(imgBg, bgX, 0, 1100, 600);
    ctx.drawImage(imgBg, bgX + 1100, 0, 1100, 600);
    
    if (bgX <= -1100) bgX = 0;

    // Karakter és akadályok (fix 1100-as koordinátákkal)
    let currentImg = imgRun[Math.floor(player.frameTimer / 6) % 2];
    if (player.isJumping) currentImg = imgJump;
    if (player.isDucking) currentImg = imgDuck[Math.floor(player.frameTimer / 6) % 2];

    const drawH = player.isDucking ? player.h * 0.7 : player.h;
    const drawY = player.isDucking ? player.y + (player.h * 0.3) : player.y;
    ctx.drawImage(currentImg, player.x, drawY, player.w, drawH);

    obstacles.forEach(obs => {
        ctx.drawImage(obs.img, obs.x, obs.y, obs.w, obs.h);
    });

    ctx.fillStyle = "black";
    ctx.font = "bold 24px Arial";
    ctx.fillText(`NER: ${playerName} | Közpénz: ${points}`, 20, 40);
}
</script>
