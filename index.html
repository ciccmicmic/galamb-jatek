<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NER-lovag Kalandjai</title>
    <style>
        body { margin: 0; overflow: hidden; background: #fff; font-family: sans-serif; touch-action: none; }
        canvas { display: block; background: #eee; }
        #menu { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; }
        input { padding: 10px; font-size: 18px; margin-bottom: 10px; border-radius: 5px; border: 1px solid #ccc; }
        button { padding: 10px 20px; font-size: 18px; cursor: pointer; background: #e74c3c; color: white; border: none; border-radius: 5px; }
    </style>
</head>
<body>

<div id="menu">
    <img src="landingpage.png" style="max-width: 300px; display: block; margin: 0 auto 20px;"><br>
    <input type="text" id="playerName" placeholder="Írd be a neved..." maxlength="12"><br>
    <button onclick="startGame()">Indítás / Tap to Start</button>
</div>

<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const menu = document.getElementById('menu');

// --- JÁTÉK ÁLLAPOTOK ---
let gameRunning = false;
let gameSpeed = 8;
let points = 0;
let playerName = "Lölő";
let bgX = 0;

// --- ASSETEK BETÖLTÉSE (Ugyanazok a nevek!) ---
function loadImg(src) { const img = new Image(); img.src = src; return img; }
const imgRun = [loadImg("ViktorRun1.png"), loadImg("ViktorRun2.png")];
const imgJump = loadImg("ViktorJump.png");
const imgDuck = [loadImg("ViktorDuck1.png"), loadImg("ViktorDuck2.png")];
const imgBg = loadImg("background.png");
const imgHeli = [loadImg("heli1.png"), loadImg("heli2.png")];
const imgCloud = loadImg("Cloud.png");
const imgAvo = [loadImg("SmallAvocado1.png"), loadImg("LargeAvocado1.png")];

// --- HANGOK ---
const bgMusic = new Audio("background_music.ogg");
bgMusic.loop = true;
const sndJump = new Audio("jump.ogg");
const sndDuck = new Audio("duck.ogg");
const sndHit = new Audio("collision.ogg");

// --- JÁTÉKOBJEKTUMOK ---
const player = {
    x: 80, y: 310, w: 80, h: 90,
    velY: 0, gravity: 0.6,
    isJumping: false, isDucking: false,
    frame: 0, frameTimer: 0
};

let obstacles = [];
let clouds = [];

// --- IRÁNYÍTÁS ---
let touchStartTime = 0;
let isTouching = false;

function handleInputStart() {
    if (!gameRunning) return;
    touchStartTime = Date.now();
    isTouching = true;
}

function handleInputEnd() {
    if (!gameRunning) return;
    let duration = Date.now() - touchStartTime;
    if (duration < 200 && !player.isJumping) {
        player.velY = -12;
        player.isJumping = true;
        sndJump.play();
    }
    isTouching = false;
    player.isDucking = false;
}

// Eseményfigyelők (Mobil + Egér)
window.addEventListener('mousedown', handleInputStart);
window.addEventListener('mouseup', handleInputEnd);
window.addEventListener('touchstart', (e) => { e.preventDefault(); handleInputStart(); });
window.addEventListener('touchend', (e) => { e.preventDefault(); handleInputEnd(); });

function startGame() {
    const inputName = document.getElementById('playerName').value;
    if (inputName) playerName = inputName;
    menu.style.display = 'none';
    gameRunning = true;
    bgMusic.play();
    resize();
    requestAnimationFrame(gameLoop);
}

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    player.y = canvas.height - 200; // Talajhoz igazítás
}
window.addEventListener('resize', resize);

// --- FŐ CIKLUS ---
function gameLoop() {
    if (!gameRunning) return;
    update();
    draw();
    requestAnimationFrame(gameLoop);
}

function update() {
    // Háttér
    bgX -= gameSpeed * 0.2;
    if (bgX <= -canvas.width) bgX = 0;

    // Játékos mozgás
    if (isTouching && (Date.now() - touchStartTime > 200)) {
        player.isDucking = true;
        if (player.isDucking && player.frameTimer % 10 === 0) sndDuck.play();
    }

    if (player.isJumping) {
        player.y += player.velY;
        player.velY += player.gravity;
        if (player.y >= canvas.height - 200) {
            player.y = canvas.height - 200;
            player.isJumping = false;
        }
    }

    // Akadályok generálása
    if (Math.random() < 0.015) {
        obstacles.push({ x: canvas.width, y: canvas.height - 180, w: 50, h: 50, img: imgAvo[Math.floor(Math.random()*2)] });
    }

    obstacles.forEach((obs, index) => {
        obs.x -= gameSpeed;
        // Ütközés figyelés (egyszerűsített)
        if (player.x < obs.x + obs.w && player.x + player.w > obs.x && player.y < obs.y + obs.h && player.y + player.h > obs.y) {
            if (!player.isDucking || obs.y < canvas.height - 150) { // Heli ellen duck segít
                sndHit.play();
                bgMusic.pause();
                location.reload(); // Újrakezdés
            }
        }
        if (obs.x < -100) obstacles.splice(index, 1);
    });

    points++;
    if (points % 500 === 0) gameSpeed += 0.5;
    player.frameTimer++;
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    // Háttér rajzolása (kettőzve a végtelenítéshez)
    ctx.drawImage(imgBg, bgX, 0, canvas.width, canvas.height);
    ctx.drawImage(imgBg, bgX + canvas.width, 0, canvas.width, canvas.height);

    // Karakter rajzolása
    let currentImg = imgRun[Math.floor(player.frameTimer / 5) % 2];
    if (player.isJumping) currentImg = imgJump;
    if (player.isDucking) currentImg = imgDuck[Math.floor(player.frameTimer / 5) % 2];

    ctx.drawImage(currentImg, player.x, player.y, player.w, player.h);

    // Akadályok
    obstacles.forEach(obs => {
        ctx.drawImage(obs.img, obs.x, obs.y, obs.w, obs.h);
    });

    // Feliratok
    ctx.fillStyle = "black";
    ctx.font = "20px Arial";
    ctx.fillText(`NER: ${playerName} | Közpénz: ${points}`, 20, 40);
}

resize();
</script>
</body>
</html>
