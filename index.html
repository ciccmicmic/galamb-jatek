<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NER-lovag Kalandjai</title>
    <style>
        body { margin: 0; overflow: hidden; background: #1a1a1a; font-family: sans-serif; touch-action: none; }
        canvas { display: block; margin: 0 auto; background: #fff; border: 2px solid #444; }
        
        #menu { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            text-align: center; background: rgba(255,255,255,0.98); 
            padding: 35px; border-radius: 25px; box-shadow: 0 0 40px rgba(0,0,0,0.8); 
            z-index: 10; width: 85%; max-width: 500px; 
        }
        
        #menu img { width: 100%; height: auto; border-radius: 15px; margin-bottom: 20px; }
        input { padding: 15px; font-size: 20px; margin-bottom: 15px; border-radius: 10px; border: 2px solid #ddd; width: 85%; }
        button { padding: 20px; font-size: 24px; cursor: pointer; background: #e74c3c; color: white; border: none; border-radius: 10px; font-weight: bold; width: 100%; }
    </style>
</head>
<body>

<div id="menu">
    <img src="landingpage.png">
    <input type="text" id="playerName" placeholder="Neved, NER-társ?" maxlength="12"><br>
    <button id="startBtn">INDÍTÁS</button>
</div>

<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const menu = document.getElementById('menu');
const startBtn = document.getElementById('startBtn');

let gameRunning = false;
let gameSpeed = 7; // LELASSÍTVA (korábban 10 volt)
let points = 0;
let playerName = "Lölő";
let bgX = 0;

// --- ASSETEK ---
function loadImg(src) { const img = new Image(); img.src = src; return img; }
const imgRun = [loadImg("ViktorRun1.png"), loadImg("ViktorRun2.png")];
const imgJump = loadImg("ViktorJump.png");
const imgDuck = [loadImg("ViktorDuck1.png"), loadImg("ViktorDuck2.png")];
const imgBg = loadImg("background.png");
const imgHeli = [loadImg("heli1.png"), loadImg("heli2.png")];
const imgAvo = [loadImg("SmallAvocado1.png"), loadImg("LargeAvocado1.png")];

const bgMusic = new Audio("background_music.ogg");
bgMusic.loop = true;
const sndJump = new Audio("jump.ogg");
const sndDuck = new Audio("duck.ogg");
const sndHit = new Audio("collision.ogg");

const player = {
    x: 80, y: 0, w: 120, h: 130, // MÉG NAGYOBB VIKTOR
    velY: 0, gravity: 0.7,
    isJumping: false, isDucking: false,
    frameTimer: 0
};

let obstacles = [];
let touchStartTime = 0;
let isTouching = false;
let nextObstacleTimer = 0; // ÚJ: Időzítő az akadályoknak

startBtn.addEventListener('click', function() {
    const inputName = document.getElementById('playerName').value;
    if (inputName) playerName = inputName;
    bgMusic.play().catch(()=>{});
    menu.style.display = 'none';
    gameRunning = true;
    resize();
    requestAnimationFrame(gameLoop);
});

function handleInputStart() { if (!gameRunning) return; touchStartTime = Date.now(); isTouching = true; }
function handleInputEnd() {
    if (!gameRunning) return;
    let duration = Date.now() - touchStartTime;
    if (duration < 200 && !player.isJumping) {
        player.velY = -15;
        player.isJumping = true;
        sndJump.play().catch(()=>{});
    }
    isTouching = false;
    player.isDucking = false;
}

window.addEventListener('mousedown', handleInputStart);
window.addEventListener('mouseup', handleInputEnd);
window.addEventListener('touchstart', (e) => { e.preventDefault(); handleInputStart(); }, {passive: false});
window.addEventListener('touchend', (e) => { e.preventDefault(); handleInputEnd(); }, {passive: false});

function resize() {
    const ratio = 1100 / 600;
    if (window.innerWidth / window.innerHeight > ratio) {
        canvas.height = window.innerHeight;
        canvas.width = canvas.height * ratio;
    } else {
        canvas.width = window.innerWidth;
        canvas.height = canvas.width / ratio;
    }
    player.y = canvas.height * 0.65;
}
window.addEventListener('resize', resize);

function gameLoop() {
    if (!gameRunning) return;
    update();
    draw();
    requestAnimationFrame(gameLoop);
}

function update() {
    // Parallax háttér lassabb úszás
    bgX -= gameSpeed * 0.12;

    if (isTouching && (Date.now() - touchStartTime > 200)) {
        player.isDucking = true;
    }

    if (player.isJumping) {
        player.y += player.velY;
        player.velY += player.gravity;
        if (player.y >= canvas.height * 0.65) {
            player.y = canvas.height * 0.65;
            player.isJumping = false;
        }
    }

    // AKADÁLY GENERÁLÁS - Ritkítva
    nextObstacleTimer++;
    if (nextObstacleTimer > 100 && Math.random() < 0.01) {
        const type = Math.random() > 0.4 ? 'avo' : 'heli';
        obstacles.push({
            x: canvas.width,
            y: type === 'heli' ? canvas.height * 0.45 : canvas.height * 0.72,
            w: 80, h: 80,
            img: type === 'heli' ? imgHeli[0] : imgAvo[0]
        });
        nextObstacleTimer = 0; // Reset, hogy ne jöjjön rögtön a következő
    }

    obstacles.forEach((obs, i) => {
        obs.x -= gameSpeed;
        // Ütközés finomítás
        if (player.x < obs.x + obs.w - 20 && player.x + player.w - 20 > obs.x + 20 && 
            (player.isDucking ? player.y + 50 : player.y) < obs.y + obs.h - 20 && 
            player.y + player.h > obs.y + 20) {
             sndHit.play();
             bgMusic.pause();
             gameRunning = false;
             setTimeout(() => location.reload(), 1500);
        }
        if (obs.x < -100) obstacles.splice(i, 1);
    });

    points++;
    if (points % 600 === 0) gameSpeed += 0.4;
    player.frameTimer++;
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // FIX HÁTTÉR - Kitölti a vásznat
    ctx.drawImage(imgBg, bgX, 0, canvas.width, canvas.height);
    ctx.drawImage(imgBg, bgX + canvas.width, 0, canvas.width, canvas.height);
    if (bgX <= -canvas.width) bgX = 0;

    // Viktor
    let currentImg = imgRun[Math.floor(player.frameTimer / 6) % 2];
    if (player.isJumping) currentImg = imgJump;
    if (player.isDucking) currentImg = imgDuck[Math.floor(player.frameTimer / 6) % 2];

    const drawH = player.isDucking ? player.h * 0.7 : player.h;
    const drawY = player.isDucking ? player.y + (player.h * 0.3) : player.y;
    ctx.drawImage(currentImg, player.x, drawY, player.w, drawH);

    // Akadályok
    obstacles.forEach(obs => { ctx.drawImage(obs.img, obs.x, obs.y, obs.w, obs.h); });

    // Szöveg
    ctx.fillStyle = "black";
    ctx.font = "bold 24px Arial";
    ctx.fillText(`NER: ${playerName} | Közpénz: ${points}`, 20, 40);
}

resize();
</script>
</body>
</html>
